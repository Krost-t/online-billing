services:
  php:
    build:
      context: ../../
      dockerfile: docker/php/Dockerfile
    volumes:
      - ../../:/var/www/html:cached
    working_dir: /var/www/html
    networks:
      - symfony-network
    depends_on:
      - db

  nginx:
    image: nginx:stable
    ports:
      - "8080:80"
    volumes:
      - ../../:/var/www/html:cached
      - ../../docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - symfony-network

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: billing0
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - symfony-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db
    networks:
      - symfony-network

volumes:
  db_data:

networks:
  symfony-network:
    driver: bridge
